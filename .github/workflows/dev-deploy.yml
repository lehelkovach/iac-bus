name: dev-deploy

on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - cursor/dev-integration-92c9
      - cursor/dev-vm-cicd-hotreload-92c9

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -q

  deploy-dev-vm:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ secrets.KSG_DEV_VM_HOST != '' && secrets.KSG_DEV_VM_USER != '' && secrets.KSG_DEV_VM_KEY != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to dev VM
        env:
          KSG_DEV_VM_HOST: ${{ secrets.KSG_DEV_VM_HOST }}
          KSG_DEV_VM_USER: ${{ secrets.KSG_DEV_VM_USER }}
          KSG_DEV_VM_PORT: ${{ secrets.KSG_DEV_VM_PORT }}
          KSG_DEV_VM_APP_DIR: ${{ secrets.KSG_DEV_VM_APP_DIR }}
          KSG_DEV_VM_KEY: ${{ secrets.KSG_DEV_VM_KEY }}
          BUS_API_TOKEN: ${{ secrets.BUS_API_TOKEN }}
          DEV_BUS_PORT: 8091
          DEV_BUS_LOG_LEVEL: DEBUG
        run: |
          chmod +x scripts/deploy-dev-vm.sh
          ./scripts/deploy-dev-vm.sh
